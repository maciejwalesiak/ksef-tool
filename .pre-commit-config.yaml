repos:
-   repo: local
    hooks:
    - id: cargo-fmt
      name: cargo fmt
      entry: cargo fmt --all -- --check
      language: system
      pass_filenames: false
      stages: [commit]
    - id: cargo-clippy
      name: cargo clippy (deny warnings)
      entry: bash -lc "cargo clippy -- -D warnings"
      language: system
      pass_filenames: false
      stages: [commit]
    - id: cargo-test
      name: cargo test
      entry: bash -lc "cargo test --quiet"
      language: system
      pass_filenames: false
      stages: [commit]
